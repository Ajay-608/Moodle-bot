{% extends 'core/base.html' %}
{% block content %}
<h2>User Management</h2>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr><th>Username</th><th>Email</th><th>Staff</th><th>Active</th></tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.is_staff|yesno:"Yes,No" }}</td>
                <td>{{ user.is_active|yesno:"Yes,No" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<a href="{% url 'admin_panel:dashboard' %}" class="btn btn-secondary">← Back</a>
{% endblock %}
