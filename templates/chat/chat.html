{% extends 'core/base.html' %}
{% block title %}AI Chatbot - MoodleBot{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-comments"></i> AI Chatbot</h4>
            </div>
            <div class="card-body p-0">
                <!-- Chat Messages -->
                <div id="chat-messages" class="p-4" style="height: 500px; overflow-y: auto; background: #f8f9fa;">
                    <div class="alert alert-info mb-3">
                        <i class="fas fa-robot me-2"></i>Ask me about Databases, SQL, Normalization, JOINs!
                    </div>
                </div>
                
                <!-- Chat Input -->
                <div class="p-4 border-top">
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your SQL question...">
                        <button class="btn btn-primary" id="send-btn">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </div>
                    <div id="status" class="mt-2 small text-muted"></div>
                </div>
            </div>
        </div>

        <!-- Sources & Confidence Panel -->
        <div class="row mt-3">
            <!-- Confidence -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body text-center p-3">
                        <div class="h4 mb-0" id="confidence-score">—</div>
                        <div class="text-muted small">Confidence</div>
                        <div class="progress mt-2" style="height: 6px;">
                            <div class="progress-bar" id="confidence-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sources -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">
                            <i class="fas fa-book me-2 text-primary"></i>
                            Sources <span id="source-count" class="badge bg-secondary">0</span>
                        </h6>
                    </div>
                    <div id="sources-panel" class="card-body p-3" style="max-height: 120px; overflow-y: auto;">
                        <small class="text-muted text-center py-3">No sources yet</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ✅ CRITICAL: Hidden CSRF Token -->
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    // ✅ FIXED: Reliable CSRF token
    function getCSRFToken() {
        return $('[name=csrfmiddlewaretoken]').val();
    }

    // Send message handler - ✅ FIXED AJAX
    window.sendMessage = function() {
        const query = $('#message-input').val().trim();
        if (!query) return;

        // Add user message immediately
        addMessage('user', query);
        $('#message-input').val('').prop('disabled', true);
        $('#send-btn').html('<i class="fas fa-spinner fa-spin me-1"></i>Thinking...').prop('disabled', true);
        $('#status').text('🔍 Searching course materials...');

        // ✅ FIXED: Proper Django AJAX with CSRF + Error Logging
        $.ajax({
            url: '{% url "chat:send_message" %}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({message: query}),
            headers: {
                'X-CSRFToken': getCSRFToken()
            },
            success: function(data) {
                console.log('✅ Success:', data); // DEBUG
                $('#chat-messages .loading').remove();
                
                const confidence = (data.confidence * 100).toFixed(0);
                addMessage('bot', data.bot_response, confidence, data.sources);
                
                updateConfidence(confidence);
                showSources(data.sources);
                $('#status').text(`✅ Answered (${confidence}%)`);
            },
            error: function(xhr, status, error) {
                console.error('❌ AJAX Error:', xhr.status, xhr.responseText); // DEBUG
                let errorMsg = '❌ Server error. ';
                if (xhr.status === 403) errorMsg += 'CSRF token missing.';
                else if (xhr.status === 500) errorMsg += 'Server crash.';
                else errorMsg += `HTTP ${xhr.status}`;
                
                addMessage('bot', errorMsg, '', []);
                $('#status').text('❌ Check browser console (F12)');
            },
            complete: function() {
                $('#message-input').prop('disabled', false).focus();
                $('#send-btn').html('<i class="fas fa-paper-plane me-1"></i>Send').prop('disabled', false);
            }
        });
    };

    // Event listeners
    $('#send-btn').click(sendMessage);
    $('#message-input').on('keypress', function(e) {
        if (e.which === 13) sendMessage();
    });

    // Message display functions
    function addMessage(sender, content, confidence = '', sources = []) {
        const messageClass = sender === 'user' ? 'user-message' : 'bot-message';
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        
        const messageDiv = $(`
            <div class="message-container mb-4 ${messageClass}">
                <div class="message-bubble">
                    ${content}
                    ${sender === 'bot' && confidence ? `
                        <div class="mt-2 p-2 bg-light rounded small">
                            <span class="badge bg-success me-2">Confidence: ${confidence}%</span>
                            <i class="fas fa-check-circle text-success"></i>
                        </div>
                    ` : ''}
                </div>
                ${sender === 'user' ? 
                    `<div class="message-time text-end mt-1 small text-muted">${time}</div>` : 
                    `<div class="message-time mt-1 small text-muted">
                        <i class="fas fa-brain me-1 text-primary"></i>${time}
                    </div>`
                }
            </div>
        `);
        
        $('#chat-messages').append(messageDiv).scrollTop($('#chat-messages')[0].scrollHeight);
    }

    function updateConfidence(confidence) {
        const percent = parseFloat(confidence);
        $('#confidence-score').text(percent.toFixed(0) + '%');
        $('#confidence-bar').css('width', percent + '%')
            .removeClass('bg-danger bg-warning bg-success')
            .addClass(percent >= 90 ? 'bg-success' : percent >= 80 ? 'bg-warning' : 'bg-danger');
    }

    function showSources(sources) {
        const panel = $('#sources-panel');
        panel.empty();
        
        if (!sources || sources.length === 0) {
            panel.html('<small class="text-muted text-center py-3">Smart fallback</small>');
            return;
        }
        
        sources.forEach((source) => {
            panel.append(`
                <div class="source-item mb-2 p-2 bg-light rounded">
                    <div class="fw-bold small">${source}</div>
                </div>
            `);
        });
        $('#source-count').text(sources.length).removeClass('bg-secondary').addClass('bg-primary');
    }
});
</script>

<style>
.message-container { animation: fadeIn 0.3s ease-in; }
.user-message .message-bubble { 
    margin-left: auto; max-width: 70%; background: #0d6efd; color: white; 
    border-radius: 18px 18px 5px 18px;
}
.bot-message .message-bubble { 
    max-width: 75%; background: white; border: 1px solid #e9ecef; border-radius: 18px 18px 18px 5px; 
}
.message-bubble { padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); word-wrap: break-word; }
.source-item:hover { background: #e3f2fd !important; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
#chat-messages::-webkit-scrollbar { width: 8px; }
#chat-messages::-webkit-scrollbar-track { background: #f8f9fa; }
#chat-messages::-webkit-scrollbar-thumb { background: #0d6efd; border-radius: 4px; }
</style>
{% endblock %}
