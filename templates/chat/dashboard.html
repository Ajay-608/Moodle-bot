<!DOCTYPE html>
<html>
<head>
    <title>Chat Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="alert alert-success">
            <h3>✅ CHAT DASHBOARD WORKING!</h3>
            <p>Chat interface is ready. Try asking about SQL, normalization, or JOINs!</p>
            <a href="/" class="btn btn-primary">← Back to Dashboard</a>
        </div>
        
        <div class="card shadow">
            <div class="card-header">
                <h5>AI Chat <i class="fas fa-robot text-primary"></i></h5>
            </div>
            <div class="card-body">
                <div id="messages" style="height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px;">
                    <div class="text-center text-muted py-4">
                        <i class="fas fa-robot fa-2x mb-2"></i>
                        <p>Start chatting about Database Systems!</p>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type your question...">
                    <button id="sendBtn" class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('sendBtn').onclick = async function() {
        const input = document.getElementById('messageInput');
        const messages = document.getElementById('messages');
        const message = input.value.trim();
        
        if (!message) return;
        
        // Add user message
        messages.innerHTML += `<div class="mb-2"><strong>You:</strong> ${message}</div>`;
        input.value = '';
        
        // Send to server
        const response = await fetch('/chat/send/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: message})
        });
        
        const data = await response.json();
        messages.innerHTML += `<div class="mb-2"><strong>MoodleBot:</strong> ${data.bot_response} <small>(Accuracy: ${(data.confidence*100).toFixed(0)}%)</small></div>`;
        messages.scrollTop = messages.scrollHeight;
    }
    </script>
</body>
</html>
