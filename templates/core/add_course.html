{% extends 'core/base.html' %}
{% block title %}Add Course - MoodleBot AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-plus me-2"></i>Add New Course</h4>
            </div>
            <div class="card-body p-5">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-success alert-dismissible fade show">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">Course Code *</label>
                        <input type="text" name="code" class="form-control" required placeholder="CS401">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Title *</label>
                        <input type="text" name="title" class="form-control" required placeholder="Database Systems">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Description *</label>
                        <textarea name="description" rows="4" class="form-control" required placeholder="Course description..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-save me-2"></i>Create Course
                        </button>
                        <a href="{% url 'core:course_list' %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
